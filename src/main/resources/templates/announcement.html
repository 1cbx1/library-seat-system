<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
    <title>系统公告 - 图书馆座位预约系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .announcement-item { border-left: 4px solid #ff4d4f; }
        .announcement-title { font-size: 18px; font-weight: bold; color: #333; }
        .announcement-time { color: #888; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">📚 图书馆座位预约系统</a>
        <ul class="navbar-menu">
            <li><a href="/">首页</a></li>
            <li><a href="/studyroom">自习室</a></li>
            <li><a href="/forum">交流论坛</a></li>
            <li><a href="/announcement" class="active">系统公告</a></li>
            <li><a href="/message">留言板</a></li>
        </ul>
        <div class="navbar-user">
            <span id="userInfo"></span>
            <a href="/login" class="btn btn-primary" id="loginBtn">登录</a>
        </div>
    </nav>

    <div class="container">
        <div class="main-content">
            <h2 class="mb-20">📢 系统公告</h2>
            <div id="announcementList">
                <p style="color: #888; text-align: center;">加载中...</p>
            </div>
        </div>
    </div>

    <script th:src="@{/js/dialog.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script>
        // 检查登录状态
        fetch('/api/user/info').then(r => r.json()).then(res => {
            if (res.code === 200) {
                const userName = res.data.realName || res.data.username;
                document.getElementById('userInfo').innerHTML = `<span>欢迎，${userName}</span>`;
                document.getElementById('loginBtn').outerHTML =
                    '<a href="/profile" class="btn btn-secondary">个人中心</a>' +
                    '<button class="btn btn-warning" style="margin-left: 8px;" onclick="logout()">退出登录</button>';
            }
        });

        async function logout() {
            if (!await appConfirm('确认退出登录吗？')) {
                return;
            }
            fetch('/api/user/logout', { method: 'POST' }).then(r => r.json()).then(res => {
                if (res.code === 200) {
                    location.href = '/login';
                } else {
                    appAlert(res.message || '退出失败');
                }
            }).catch(() => appAlert('退出失败，请稍后重试'));
        }

        fetch('/api/announcement/list').then(r => r.json()).then(res => {
            if (res.code === 200) {
                if (res.data.length === 0) {
                    document.getElementById('announcementList').innerHTML = 
                        '<p style="color: #888; text-align: center;">暂无公告</p>';
                    return;
                }
                
                const html = res.data.map(a => `
                    <div class="card announcement-item">
                        <div class="announcement-title">${a.title}</div>
                        <div class="announcement-time">📅 ${a.createTime ? formatDateTime(a.createTime) : ''} | 👤 ${a.authorName || '管理员'}</div>
                        <p style="margin-top: 15px; color: #666; line-height: 1.8;">${a.content}</p>
                        ${a.top === 1 ? '<span class="tag tag-danger" style="margin-top: 10px;">置顶</span>' : ''}
                    </div>
                `).join('');
                document.getElementById('announcementList').innerHTML = html;
            }
        });
    </script>
</body>
</html>
