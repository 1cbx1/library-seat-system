<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
    <title>自习室 - 图书馆座位预约系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', -apple-system, sans-serif; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="navbar-brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <span>图书馆座位</span>
        </a>
        <ul class="navbar-menu">
            <li><a href="/">首页</a></li>
            <li><a href="/studyroom" class="active">自习室</a></li>
            <li><a href="/forum">交流论坛</a></li>
            <li><a href="/announcement">系统公告</a></li>
            <li><a href="/message">留言板</a></li>
        </ul>
        <div class="navbar-user">
            <button id="themeToggle" class="btn btn-ghost" style="padding: 8px 12px; border-radius: 10px;" title="切换主题">
                <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <span id="userInfo"></span>
            <a href="/login" class="btn btn-primary" id="loginBtn">登录</a>
        </div>
    </nav>

    <!-- Page Header -->
    <section style="padding-top: 72px; padding-bottom: 48px; background: linear-gradient(180deg, var(--color-surface) 0%, var(--color-bg) 100%);">
        <div class="container" style="text-align: center;">
            <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 16px;">自习室预约</h1>
            <p style="color: var(--color-text-muted); max-width: 500px; margin: 0 auto; font-size: 15px;">
                选择心仪的自习室和座位，开始专注学习之旅
            </p>
        </div>
    </section>

    <!-- Study Room List -->
    <section class="container" style="padding: 0 24px 80px;">
        <div id="roomList" class="grid grid-3" style="gap: 24px;">
            <div class="skeleton" style="height: 320px; border-radius: 20px;"></div>
            <div class="skeleton" style="height: 320px; border-radius: 20px;"></div>
            <div class="skeleton" style="height: 320px; border-radius: 20px;"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">图书馆座位预约系统</p>
    </footer>

    <script th:src="@{/js/dialog.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'light') {
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
            } else {
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // Check login status
        fetch('/api/user/info').then(r => r.json()).then(res => {
            if (res.code === 200) {
                const userName = res.data.realName || res.data.username;
                document.getElementById('userInfo').innerHTML = `<span style="color: var(--color-text-muted);">欢迎，${userName}</span>`;
                document.getElementById('loginBtn').outerHTML =
                    '<a href="/profile" class="btn btn-secondary">个人中心</a>' +
                    '<button class="btn btn-ghost" onclick="logout()">退出</button>';
            }
        });

        async function logout() {
            if (!await appConfirm('确认退出登录吗？')) return;
            fetch('/api/user/logout', { method: 'POST' }).then(r => r.json()).then(res => {
                if (res.code === 200) location.href = '/login';
                else appAlert(res.message || '退出失败');
            }).catch(() => appAlert('退出失败，请稍后重试'));
        }

        // Load study rooms
        fetch('/api/room/list').then(r => r.json()).then(res => {
            if (res.code === 200) {
                if (res.data.length === 0) {
                    document.getElementById('roomList').innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <div class="empty-state-title">暂无自习室</div>
                            <div class="empty-state-text">暂时没有可用的自习室，请稍后再来</div>
                        </div>
                    `;
                    return;
                }
                const html = res.data.map((r, index) => `
                    <div class="card fade-in-up delay-${(index % 6) + 1}" onclick="location.href='/studyroom/detail?id=${r.id}'" style="cursor: pointer; border-radius: 20px; overflow: hidden; padding: 0;">
                        <div style="position: relative;">
                            <img src="${r.imageUrl || 'https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=600&q=80'}" style="width: 100%; height: 160px; object-fit: cover;" alt="${r.roomName}">
                            <div style="position: absolute; top: 12px; right: 12px;">
                                <span class="tag tag-success" style="background: rgba(34, 197, 94, 0.9); color: #fff; padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600;">
                                    可预约
                                </span>
                            </div>
                        </div>
                        <div style="padding: 20px;">
                            <h3 class="card-title" style="font-size: 17px; margin-bottom: 12px;">${r.roomName}</h3>
                            <p class="card-info" style="margin-bottom: 8px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 6px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                ${r.location || '位置待定'}
                            </p>
                            <p class="card-info" style="margin-bottom: 8px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 6px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                                容量 ${r.capacity} 人
                            </p>
                            <p class="card-info" style="margin-bottom: 16px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 6px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${r.openTime || '08:00-22:00'}
                            </p>
                            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--color-border);">
                                <span style="font-size: 20px; font-weight: 700; color: var(--color-primary);">
                                    ¥${r.hourPrice}<span style="font-size: 12px; font-weight: 400; color: var(--color-text-muted);">/小时</span>
                                </span>
                                <button class="btn btn-primary btn-sm">立即预约</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('roomList').innerHTML = html;
            }
        });
    </script>
</body>
</html>
